repository: https://github.com/zapcooking/zap_cooking_android
description: Zap Cooking is a food-first Nostr client for Android. Discover, publish, and collect recipes, browse the OnlyFood feed of food content from across the network, and cook together in group chat rooms. Zap your favorite cooks with the built-in self-custodial Spark Lightning wallet or any NWC-compatible wallet, and message privately with encrypted DMs.
summary: Cook, share, and zap recipes on Nostr
